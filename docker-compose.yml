services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-go_vue_base}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override specific values for Docker environment
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/go_vue_base?sslmode=disable
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    volumes:
      - ./backend:/app
      - /app/tmp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      # Override specific values for Docker environment
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8080
    restart: unless-stopped

  # MailHog for local email testing
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1026:1025"  # SMTP server (mapped to avoid conflicts)
      - "8026:8025"  # Web UI (mapped to avoid conflicts)
    restart: unless-stopped

volumes:
  postgres_data:
